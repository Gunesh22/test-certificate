<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Generator</title>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    @font-face {
      font-family: 'Alex Brush';
      src: url('https://fonts.gstatic.com/s/alexbrush/v22/SZc83FzrJKuqFbwMKk6EtUL57DtOmCc.ttf') format('truetype');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #e2b04a, #f0d78c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .controls {
      background: #16213e;
      border-radius: 12px;
      padding: 20px;
      width: 100%;
      max-width: 700px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    label { display: block; margin-bottom: 4px; font-size: 0.85rem; color: #aaa; }
    input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #0f3460;
      color: #fff;
      font-size: 1rem;
      outline: none;
      margin-bottom: 12px;
    }
    input[type="text"]:focus { border-color: #e2b04a; }
    .sliders { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 12px; }
    .slider-group { flex: 1; min-width: 140px; }
    input[type="range"] { width: 100%; accent-color: #e2b04a; }
    .coords {
      background: #0f3460;
      padding: 8px 14px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.9rem;
      color: #e2b04a;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #e2b04a, #c9952e);
      color: #1a1a2e;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { transform: scale(1.02); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .preview-wrap {
      position: relative;
      display: inline-block;
      border: 2px solid #333;
      border-radius: 8px;
      overflow: hidden;
      max-width: 100%;
    }
    #pdfCanvas { display: block; max-width: 100%; height: auto; }
    .status { margin-top: 10px; text-align: center; color: #aaa; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>🎓 Certificate Generator</h1>

  <div class="controls">
    <label for="nameInput">Enter Your Full Name</label>
    <input type="text" id="nameInput" placeholder="e.g. Gunesh Borkar" autofocus>

    <div class="sliders">
      <div class="slider-group">
        <label>X Position: <span id="xVal">50</span>%</label>
        <input type="range" id="xSlider" min="0" max="100" value="50">
      </div>
      <div class="slider-group">
        <label>Y Position: <span id="yVal">52</span>%</label>
        <input type="range" id="ySlider" min="0" max="100" value="52">
      </div>
      <div class="slider-group">
        <label>Font Size: <span id="fsVal">36</span>px</label>
        <input type="range" id="fsSlider" min="12" max="72" value="36">
      </div>
    </div>

    <div class="coords" id="coordsDisplay">
      PDF Coordinates → X: 0, Y: 0 | Font Size: 36
    </div>

    <button id="downloadBtn" onclick="generateCertificate()">⬇ Download Certificate PDF</button>
    <div class="status" id="status"></div>
  </div>

  <div class="preview-wrap" id="previewWrap">
    <canvas id="pdfCanvas"></canvas>
  </div>

  <script>
    // PDF.js worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let pdfPageWidth = 0, pdfPageHeight = 0;
    let pdfBytes = null;
    let offscreenCanvas = null;
    let offscreenCtx = null;

    // Load and render PDF preview
    async function loadPreview() {
      const res = await fetch('certificate-template.pdf');
      pdfBytes = await res.arrayBuffer();

      const pdf = await pdfjsLib.getDocument({ data: pdfBytes.slice(0) }).promise;
      const page = await pdf.getPage(1);

      const scale = 2.0; // Higher scale for high-res rendering
      const viewport = page.getViewport({ scale });
      pdfPageWidth = viewport.width / scale;
      pdfPageHeight = viewport.height / scale;

      // Set up offscreen canvas to cache PDF page
      offscreenCanvas = document.createElement('canvas');
      offscreenCanvas.width = viewport.width;
      offscreenCanvas.height = viewport.height;
      offscreenCtx = offscreenCanvas.getContext('2d');

      await page.render({ canvasContext: offscreenCtx, viewport }).promise;

      // Set visible canvas dimensions
      const canvas = document.getElementById('pdfCanvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;

      updateOverlay();
    }

    function updateOverlay() {
      if (!offscreenCanvas) return;

      const name = document.getElementById('nameInput').value || 'Your Name';
      const xPct = parseInt(document.getElementById('xSlider').value);
      const yPct = parseInt(document.getElementById('ySlider').value);
      const fontSize = parseInt(document.getElementById('fsSlider').value);

      const canvas = document.getElementById('pdfCanvas');
      const ctx = canvas.getContext('2d');

      // Clear visible canvas
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw background PDF
      ctx.drawImage(offscreenCanvas, 0, 0);

      // Draw text directly on visible canvas
      const scale = canvas.width / pdfPageWidth;
      const canvasFontSize = fontSize * scale;

      ctx.save();
      ctx.font = `normal ${canvasFontSize}px 'Alex Brush'`;
      ctx.fillStyle = 'rgba(26, 26, 26, 0.9)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'alphabetic';

      // Draw baseline of text precisely at canvasY
      const canvasX = (xPct / 100) * canvas.width;
      const canvasY = (yPct / 100) * canvas.height;

      ctx.fillText(name, canvasX, canvasY);
      ctx.restore();

      // Calculate actual PDF coordinates for pdf-lib
      // pdf-lib Y is from BOTTOM, so flip it
      const pdfX = (xPct / 100) * pdfPageWidth;
      const pdfY = (1 - yPct / 100) * pdfPageHeight;

      document.getElementById('xVal').textContent = xPct;
      document.getElementById('yVal').textContent = yPct;
      document.getElementById('fsVal').textContent = fontSize;
      document.getElementById('coordsDisplay').textContent =
        `PDF Coordinates → X: ${Math.round(pdfX)}, Y: ${Math.round(pdfY)} | Font Size: ${fontSize}`;
    }

    // Event listeners
    document.getElementById('nameInput').addEventListener('input', updateOverlay);
    document.getElementById('xSlider').addEventListener('input', updateOverlay);
    document.getElementById('ySlider').addEventListener('input', updateOverlay);
    document.getElementById('fsSlider').addEventListener('input', updateOverlay);

    async function generateCertificate() {
      const name = document.getElementById('nameInput').value.trim();
      if (!name) { alert('Please enter your name'); return; }

      const btn = document.getElementById('downloadBtn');
      const status = document.getElementById('status');
      btn.disabled = true;
      status.textContent = 'Generating certificate...';

      try {
        const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes.slice(0));
        pdfDoc.registerFontkit(fontkit);
        const page = pdfDoc.getPages()[0];
        const { width, height } = page.getSize();
        // Load and embed Alex Brush font
        const fontUrl = 'https://fonts.gstatic.com/s/alexbrush/v22/SZc83FzrJKuqFbwMKk6EtUL57DtOmCc.ttf';
        const fontBytesRes = await fetch(fontUrl);
        const fontBytesArr = await fontBytesRes.arrayBuffer();
        const font = await pdfDoc.embedFont(fontBytesArr);

        const fontSize = parseInt(document.getElementById('fsSlider').value);
        const xPct = parseInt(document.getElementById('xSlider').value);
        const yPct = parseInt(document.getElementById('ySlider').value);

        // Center text at the X position
        const textWidth = font.widthOfTextAtSize(name, fontSize);
        const pdfX = (xPct / 100) * width - textWidth / 2;
        // Shift up slightly to perfectly match the browser canvas's baseline rendering
        const pdfY = (1 - yPct / 100) * height + (fontSize * 0.15);

        page.drawText(name, {
          x: pdfX,
          y: pdfY,
          size: fontSize,
          font: font,
          color: PDFLib.rgb(0.1, 0.1, 0.1),
        });

        const modifiedPdf = await pdfDoc.save();
        const blob = new Blob([modifiedPdf], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Certificate_${name.replace(/\s+/g, '_')}.pdf`;
        a.click();
        URL.revokeObjectURL(url);
        status.textContent = '✅ Certificate downloaded!';
      } catch (err) {
        status.textContent = '❌ Error: ' + err.message;
        console.error(err);
      }
      btn.disabled = false;
    }

    // Wait for the Google Font to load before rendering so it renders correctly
    document.fonts.ready.then(() => {
      loadPreview();
    });
  </script>
</body>
</html>
